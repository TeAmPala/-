<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<title>Змейка</title>
<style>
  body { margin: 0; background: #1a1a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: monospace; color: #fff; }
  canvas { border: 2px solid #444; }
  #info { margin-bottom: 10px; font-size: 18px; }
  #msg { margin-top: 10px; font-size: 14px; color: #aaa; }
</style>
</head>
<body>
<div id="info">Счёт: <span id="score">0</span></div>
<canvas id="c" width="400" height="400"></canvas>
<div id="msg">Нажми пробел для старта</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const msgEl = document.getElementById('msg');

const SIZE = 20, COLS = 20;
let snake, dir, food, score, running, interval;

function start() {
  snake = [{x:10, y:10}, {x:9, y:10}, {x:8, y:10}];
  dir = {x:1, y:0};
  score = 0;
  scoreEl.textContent = 0;
  msgEl.textContent = '';
  placeFood();
  clearInterval(interval);
  running = true;
  interval = setInterval(tick, 150);
}

function placeFood() {
  do { food = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*COLS)}; }
  while (snake.some(s => s.x===food.x && s.y===food.y));
}

function tick() {
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
  if (head.x<0 || head.x>=COLS || head.y<0 || head.y>=COLS || snake.some(s=>s.x===head.x&&s.y===head.y)) {
    clearInterval(interval);
    running = false;
    msgEl.textContent = 'Игра окончена! Пробел — заново';
    return;
  }
  snake.unshift(head);
  if (head.x===food.x && head.y===food.y) { score++; scoreEl.textContent=score; placeFood(); }
  else snake.pop();
  draw();
}

function draw() {
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(0, 0, 400, 400);

  ctx.fillStyle = '#e74c3c';
  ctx.fillRect(food.x*SIZE+2, food.y*SIZE+2, SIZE-4, SIZE-4);

  snake.forEach((s, i) => {
    ctx.fillStyle = i===0 ? '#2ecc71' : '#27ae60';
    ctx.fillRect(s.x*SIZE+1, s.y*SIZE+1, SIZE-2, SIZE-2);
  });
}

document.addEventListener('keydown', e => {
  const keys = { ArrowUp:{x:0,y:-1}, ArrowDown:{x:0,y:1}, ArrowLeft:{x:-1,y:0}, ArrowRight:{x:1,y:0},
                 w:{x:0,y:-1}, s:{x:0,y:1}, a:{x:-1,y:0}, d:{x:1,y:0} };
  if (e.key === ' ') { e.preventDefault(); if (!running) start(); return; }
  const d = keys[e.key];
  if (d && !(d.x===-dir.x && d.y===-dir.y)) { e.preventDefault(); dir = d; }
});

draw();
</script>
</body>
</html>
