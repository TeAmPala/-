<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Блокнот</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        #notepad {
            width: 100%;
            height: 300px;
            border: 1px solid #ccc;
            padding: 10px;
            background-color: #fff;
            resize: none;
        }
        button {
            margin-top: 10px;
        }
    </style>
</head>
<body>

<h1>Блокнот</h1>
<textarea id="notepad" placeholder="Введите текст..."></textarea><br>
<button onclick="saveNote()">Сохранить заметку</button>

<script>
    function saveNote() {
        const note = document.getElementById('notepad').value;
        const blob = new Blob([note], { type: 'text/plain' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'note.txt';
        link.click();
    }
</script>

</body>
</html>
