<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Супер Калькулятор</title>

<style>
*{
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#141e30,#243b55);
}

.calculator{
    width:420px;
    background:#1f1f1f;
    padding:20px;
    border-radius:20px;
    box-shadow:0 0 25px rgba(0,0,0,0.6);
}

.display{
    width:100%;
    height:80px;
    border:none;
    border-radius:15px;
    margin-bottom:15px;
    padding:15px;
    font-size:2rem;
    text-align:right;
    background:#000;
    color:#00ff99;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:10px;
}

button{
    height:60px;
    border:none;
    border-radius:12px;
    font-size:1rem;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
}

.number{
    background:#333;
    color:white;
}

.operator{
    background:#ff9800;
    color:white;
}

.function{
    background:#5e35b1;
    color:white;
}

.equal{
    background:#00c853;
    color:white;
}

.clear{
    background:#d50000;
    color:white;
}
</style>
</head>

<body>

<div class="calculator">

<input type="text" id="display" class="display" disabled>

<div class="buttons">

<button class="clear" onclick="clearDisplay()">C</button>
<button class="operator" onclick="appendValue('(')">(</button>
<button class="operator" onclick="appendValue(')')">)</button>
<button class="operator" onclick="appendValue('/')">÷</button>
<button class="operator" onclick="backspace()">⌫</button>

<button class="number" onclick="appendValue('7')">7</button>
<button class="number" onclick="appendValue('8')">8</button>
<button class="number" onclick="appendValue('9')">9</button>
<button class="operator" onclick="appendValue('*')">×</button>
<button class="function" onclick="appendValue('**')">xʸ</button>

<button class="number" onclick="appendValue('4')">4</button>
<button class="number" onclick="appendValue('5')">5</button>
<button class="number" onclick="appendValue('6')">6</button>
<button class="operator" onclick="appendValue('-')">−</button>
<button class="function" onclick="appendFunction('sqrt')">√</button>

<button class="number" onclick="appendValue('1')">1</button>
<button class="number" onclick="appendValue('2')">2</button>
<button class="number" onclick="appendValue('3')">3</button>
<button class="operator" onclick="appendValue('+')">+</button>
<button class="function" onclick="appendFunction('sin')">sin</button>

<button class="number" onclick="appendValue('0')">0</button>
<button class="number" onclick="appendValue('.')">.</button>
<button class="equal" onclick="calculate()">=</button>
<button class="function" onclick="appendFunction('cos')">cos</button>
<button class="function" onclick="appendFunction('tan')">tan</button>

<button class="function" onclick="appendFunction('cot')">cot</button>
<button class="function" onclick="appendFunction('log')">ln</button>
<button class="function" onclick="appendFunction('log10')">log</button>
<button class="function" onclick="appendValue('Math.PI')">π</button>
<button class="function" onclick="appendValue('Math.E')">e</button>

</div>
</div>

<script>

const display = document.getElementById("display");

function appendValue(value){
    display.value += value;
}

function appendFunction(func){

    switch(func){

        case 'sqrt':
            display.value += 'Math.sqrt(';
            break;

        case 'sin':
            display.value += 'Math.sin(';
            break;

        case 'cos':
            display.value += 'Math.cos(';
            break;

        case 'tan':
            display.value += 'Math.tan(';
            break;

        case 'cot':
            display.value += '1/Math.tan(';
            break;

        case 'log':
            display.value += 'Math.log(';
            break;

        case 'log10':
            display.value += 'Math.log10(';
            break;
    }
}

function clearDisplay(){
    display.value = '';
}

function backspace(){
    display.value = display.value.slice(0,-1);
}

function calculate(){

    try{
        let result = eval(display.value);
        display.value = result;
    }
    catch(error){
        display.value = "Ошибка";
    }
}

document.addEventListener("keydown",(event)=>{

    const allowed = "0123456789+-*/().";

    if(allowed.includes(event.key)){
        appendValue(event.key);
    }

    if(event.key === "Enter"){
        calculate();
    }

    if(event.key === "Backspace"){
        backspace();
    }

    if(event.key.toLowerCase() === "c"){
        clearDisplay();
    }
});

</script>

</body>
</html>
